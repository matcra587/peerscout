version: "3"

vars:
  PROJECT_NAME: peerscout
  BINARY_NAME: peerscout
  MODULE: github.com/matcra587/peerscout
  DIST_DIR: ./dist
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  GIT_BRANCH:
    sh: git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown"
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  BUILD_BY:
    sh: whoami
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH
  LD_FLAGS: >-
    -s -w
    -X '{{.MODULE}}/internal/version.Version={{.VERSION}}'
    -X '{{.MODULE}}/internal/version.Commit={{.GIT_COMMIT}}'
    -X '{{.MODULE}}/internal/version.Branch={{.GIT_BRANCH}}'
    -X '{{.MODULE}}/internal/version.BuildTime={{.BUILD_TIME}}'
    -X '{{.MODULE}}/internal/version.BuildBy={{.BUILD_BY}}'

tasks:
  default:
    desc: List available tasks
    silent: true
    cmd: task --list

  # ── Build ──────────────────────────────────────────────

  build:
    desc: Build the binary
    aliases: [b]
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - go build -ldflags '{{.LD_FLAGS}}' -o {{.DIST_DIR}}/{{.BINARY_NAME}}-{{.GOOS}}-{{.GOARCH}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST_DIR}}/{{.BINARY_NAME}}-{{.GOOS}}-{{.GOARCH}}"

  install:
    desc: Install binary to GOPATH/bin
    cmd: go install -ldflags '{{.LD_FLAGS}}' .

  run:
    desc: Build and run
    aliases: [r]
    deps: [build]
    cmd: "{{.DIST_DIR}}/{{.BINARY_NAME}}-{{.GOOS}}-{{.GOARCH}}"

  # ── Release ────────────────────────────────────────────

  release:check:
    desc: Run GoReleaser health check
    cmd: goreleaser healthcheck

  release:build:
    desc: Build binaries with GoReleaser (no publish)
    cmd: goreleaser build --snapshot --clean

  release:snapshot:
    desc: Build a full snapshot release locally
    cmd: goreleaser release --snapshot --clean

  # ── Test ───────────────────────────────────────────────

  test:
    desc: Run tests with coverage
    aliases: [t]
    cmd: go test -v -cover ./...

  test:race:
    desc: Run tests with race detection (requires CGO)
    env:
      CGO_ENABLED: "1"
    cmd: go test -v -race -cover ./...

  # ── Code Quality ───────────────────────────────────────

  fmt:
    desc: Format code with gofmt and gofumpt
    cmds:
      - go fmt ./...
      - go tool gofumpt -l -w .

  fmt:file:
    desc: Format a single Go file with gofumpt
    cmd: go tool gofumpt -w {{.CLI_ARGS}}

  lint:
    desc: Run golangci-lint with auto-fix
    cmd: go tool golangci-lint run --fix

  rumdl:
    desc: Lint markdown files with rumdl
    cmd: rumdl check .

  rumdl:fix:
    desc: Fix a single markdown file with rumdl
    cmd: rumdl fix {{.CLI_ARGS}}

  vet:
    desc: Run go vet
    cmd: go vet ./...

  security:
    desc: Run govulncheck
    cmd: go tool govulncheck ./...

  # ── Dependencies ───────────────────────────────────────

  deps:
    desc: Download Go module dependencies
    cmd: go mod download

  deps:update:
    desc: Update all dependencies (patch only)
    cmds:
      - go get -u=patch ./...
      - go mod tidy

  deps:update:minor:
    desc: Update all dependencies (minor + patch)
    cmds:
      - go get -u ./...
      - go mod tidy

  # ── Misc ───────────────────────────────────────────────

  generate:
    desc: Run go generate
    cmd: go generate ./...

  version:
    desc: Print build version info
    silent: true
    cmd: |
      echo "Version:    {{.VERSION}}"
      echo "Commit:     {{.GIT_COMMIT}}"
      echo "Branch:     {{.GIT_BRANCH}}"
      echo "Built:      {{.BUILD_TIME}}"
      echo "Built by:   {{.BUILD_BY}}"
      echo "Go version: $(go version)"

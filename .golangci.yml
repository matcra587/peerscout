version: "2"

linters:
  disable:
    - errchkjson
  enable:
    - bodyclose
    - depguard
    - containedctx
    - dogsled
    - dupword
    - errcheck
    - errorlint
    - fatcontext
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nakedret
    - nilerr
    - noctx
    - nosprintfhostport
    - perfsprint
    - predeclared
    - revive
    - sqlclosecheck
    - staticcheck
    - testifylint
    - unconvert
    - unused
    - usetesting
  settings:
    revive:
      rules:
        - name: argument-limit
          arguments: [6]
        - name: atomic
        - name: bare-return
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: call-to-gc
        - name: confusing-naming
        - name: confusing-results
        - name: constant-logical-expr
        - name: context-as-argument
        - name: context-keys-type
        - name: deep-exit
        - name: defer
        - name: dot-imports
        - name: duplicated-imports
        - name: early-return
        - name: empty-block
        - name: empty-lines
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: function-result-limit
          arguments: [3]
        - name: identical-branches
        - name: if-return
        - name: import-shadowing
        - name: increment-decrement
        - name: indent-error-flow
        - name: modifies-parameter
        - name: modifies-value-receiver
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: string-of-int
        - name: struct-tag
        - name: superfluous-else
        - name: time-naming
        - name: unconditional-recursion
        - name: unexported-naming
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming
        - name: waitgroup-by-value
    nakedret:
      max-func-lines: 1
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    depguard:
      rules:
        main:
          deny:
            - pkg: "log"
              desc: "use github.com/gechr/clog instead of the standard log package"
            - pkg: "log/slog"
              desc: "use github.com/gechr/clog instead of log/slog"
            - pkg: "io/ioutil"
              desc: "deprecated since Go 1.16 - use io and os packages instead"
            - pkg: "crypto/md5"
              desc: "weak hash - use crypto/sha256 or stronger"
            - pkg: "crypto/sha1"
              desc: "weak hash - use crypto/sha256 or stronger"
    staticcheck:
      checks:
        - "all"
        - "-QF1008"
        - "-QF1012"

run:
  timeout: 10m

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
      custom-order: true

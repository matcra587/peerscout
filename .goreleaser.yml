# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: peerscout
report_sizes: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy
    - go generate ./...

# ── Build ────────────────────────────────────────────────

builds:
  - id: peerscout
    main: .
    binary: peerscout
    mod_timestamp: "{{ .CommitTimestamp }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w
      - -X '{{ .ModulePath }}/internal/version.Version={{ .Version }}'
      - -X '{{ .ModulePath }}/internal/version.Commit={{ .ShortCommit }}'
      - -X '{{ .ModulePath }}/internal/version.Branch={{ .Branch }}'
      - -X '{{ .ModulePath }}/internal/version.BuildTime={{ .Date }}'
      - -X '{{ .ModulePath }}/internal/version.BuildBy=goreleaser'

# ── Package ──────────────────────────────────────────────

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

# ── Signing ──────────────────────────────────────────────

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

# ── Distribute ───────────────────────────────────────────

homebrew_casks:
  - repository:
      owner: matcra587
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/matcra587/peerscout
    description: Fetch live peers for Cosmos SDK chains
    license: MIT
    binaries:
      - peerscout

# ── Changelog ────────────────────────────────────────────

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^style:'
      - '^chore:'
      - '^ci:'
      - '^test:'
